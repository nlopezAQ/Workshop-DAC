name: Deploy AsciiDoc

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Asciidoctor
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor ruby
          sudo gem install asciidoctor-pdf

      - name: Build HTML
        run: |
          mkdir public
          asciidoctor docs/instrucciones.adoc -D public

      - name: Build PDF
        run: |
          mkdir -p public/pdf
          asciidoctor-pdf docs/instrucciones.adoc -D public/pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
